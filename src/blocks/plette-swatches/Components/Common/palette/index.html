<!-- ==========================
     04 Color Palette — verbatim markup reference
     Mirrors the JSX in OneCard.js (one <button> per swatch, rendered from the
     `swatches` repeater). Not imported by the build; kept as the source-of-truth
     for the migrated markup (classes carry the `ctc_ps` prefix). The per-swatch
     color drives the chip via the inline `--c` custom property.
========================== -->
<div class="ctc_ps_palette-stage ctc_ps_stage--paper">
  <div class="ctc_ps_palette">
    <button class="ctc_ps_swatch ctc_ps_js-copy" data-fx="swatch" data-copy="#6C5CE7" style="--c:#6C5CE7"><span class="ctc_ps_swatch__hex">#6C5CE7</span></button>
    <button class="ctc_ps_swatch ctc_ps_js-copy" data-fx="swatch" data-copy="#00CEC9" style="--c:#00CEC9"><span class="ctc_ps_swatch__hex">#00CEC9</span></button>
    <button class="ctc_ps_swatch ctc_ps_js-copy" data-fx="swatch" data-copy="#FD79A8" style="--c:#FD79A8"><span class="ctc_ps_swatch__hex">#FD79A8</span></button>
    <button class="ctc_ps_swatch ctc_ps_js-copy" data-fx="swatch" data-copy="#FDCB6E" style="--c:#FDCB6E"><span class="ctc_ps_swatch__hex">#FDCB6E</span></button>
    <button class="ctc_ps_swatch ctc_ps_js-copy" data-fx="swatch" data-copy="#0984E3" style="--c:#0984E3"><span class="ctc_ps_swatch__hex">#0984E3</span></button>
    <button class="ctc_ps_swatch ctc_ps_js-copy" data-fx="swatch" data-copy="#00B894" style="--c:#00B894"><span class="ctc_ps_swatch__hex">#00B894</span></button>
  </div>
</div>
