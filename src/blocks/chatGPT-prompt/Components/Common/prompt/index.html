<!-- ==========================
     ChatGPT Prompt — verbatim markup reference
     Migrated from the showcase "ChatGPT Prompt" template (block/js/preview.js
     `prompt()` + the AI-category card). Mirrors the JSX in OneCard.js; not
     imported by the build. Classes carry the `ctc_gpt` prefix. Clicking the
     button copies the prompt text and flashes the button green (.ctc_gpt_is-copied).
========================== -->
<div class="ctc_gpt_prompt-stage ctc_gpt_stage--ai">
  <div class="ctc_gpt_prompt" data-fx="prompt">
    <div class="ctc_gpt_prompt__head">
      <span class="ctc_gpt_prompt__avatar">GPT</span>
      <span class="ctc_gpt_prompt__model">ChatGPT</span>
    </div>
    <p class="ctc_gpt_prompt__text">Act as a senior software engineer. Review the following code for bugs, readability and performance, then suggest concrete improvements:</p>
    <button class="ctc_gpt_prompt__btn ctc_gpt_js-copy" data-copy="Act as a senior software engineer. Review the following code for bugs, readability and performance, then suggest concrete improvements:" aria-label="Copy prompt">
      <svg class="ctc_gpt_prompt__ico" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span class="ctc_gpt_prompt__btn-txt">Copy prompt</span>
    </button>
  </div>
</div>
